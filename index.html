<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Подборка лучших SEO-инструментов: исследование ключевых слов, анализ ссылок, оптимизация контента, технический и локальный SEO. Каталог на русском языке для продвижения сайтов в РФ и СНГ.">
  <title>Каталог SEO-инструментов для продвижения и оптимизации сайтов</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #161b22;
      --bg-input: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
    }

    header {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin: 1rem 0;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filter-btn {
      padding: 0.5rem 0.9rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .filter-btn:hover {
      background: var(--bg-card);
      border-color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .counter {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-left: auto;
    }

    .counter strong { color: var(--success); }

    main {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }

    .sidebar {
      position: sticky;
      top: 1rem;
      height: fit-content;
    }

    .sidebar-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .sidebar .filter-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 0.25rem;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-content: start;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .card-title {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .card-title a {
      color: var(--accent);
      text-decoration: none;
    }

    .card-title a:hover { color: var(--accent-hover); text-decoration: underline; }

    .card-desc {
      margin: 0 0 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .card-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .to-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.25rem;
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s, transform 0.15s;
    }

    .to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .to-top:hover { transform: scale(1.05); }
  </style>
</head>

      { name: 'Ahrefs SEO Toolbar', url: 'https://chrome.google.com/webstore/detail/ahrefs-seo-toolbar-on-pag/hgmoccdbjhknikckedaaebbpdeebhiei', desc: 'Он-страничный отчёт, битые ссылки, редиректы, смена страны поиска.', cat: 'extensions' },
      { name: 'Redirect Path', url: 'https://chrome.google.com/webstore/detail/redirect-path/aomidfkchockcldhbkggjokdkkebmdll?hl=en', desc: 'Проверка HTTP-заголовков и редиректов для SEO.', cat: 'extensions' },
      { name: 'META SEO inspector', url: 'https://chrome.google.com/webstore/detail/meta-seo-inspector/ibkclpciafdglkjkcibmohobjkcfkaef?hl=en', desc: 'Просмотр метаданных страницы, ошибки и советы по исправлению.', cat: 'extensions' },
      { name: 'Similarweb', url: 'https://chrome.google.com/webstore/detail/similarweb-traffic-rank-w/hoklmmgfnpapgjgcpechhaamimifchmp?hl=en', desc: 'Анализ сайта: позиция, трафик, источники и география.', cat: 'extensions' },
      { name: 'TextOptimizer', url: 'https://chrome.google.com/webstore/detail/textoptimizer/fdbbkmpdjmpnebmdgbhcodhlafiicnkd', desc: 'Анализ SERP и таблицы намерений для улучшения текста.', cat: 'extensions' },
      { name: 'SEO Search Simulator', url: 'https://chrome.google.com/webstore/detail/seo-search-simulator-by-n/edfjfgjklednkencfhnokmkajbgfhpon?hl=en', desc: 'Эмуляция поиска Google из любой локации и проверка позиции URL.', cat: 'extensions' },
      { name: 'BuzzSumo', url: 'https://chrome.google.com/webstore/detail/buzzsumo/phpihcpfhciibkmlllgcjkbmhhpcaojc?hl=en', desc: 'Контент, ссылки и соцсети в одном расширении.', cat: 'extensions' },
      { name: 'Google Lighthouse', url: 'https://chrome.google.com/webstore/detail/lighthouse/blipmdconlkpinefehnmjammfjpmpbjk', desc: 'Отчёты и советы по SEO, скорости, доступности и др.', cat: 'extensions' },
      { name: 'Checkbot', url: 'https://www.checkbot.io/', desc: 'Краул сотен страниц: 50+ проверок SEO, скорости и безопасности.', cat: 'extensions' },
      { name: 'SEO Sidebar', url: 'https://chromewebstore.google.com/detail/seo-sidebar/gmmiickdcmghfpliaiefhjafccapgmpp', desc: 'Он-страничные SEO-данные в боковой панели и экспорт в отчёты.', cat: 'extensions' },
      { name: 'ShotOG', url: 'https://github.com/nicepkg/shotog', desc: 'Open source API для OG-изображений на edge (~50ms) для соцсетей.', cat: 'social' },
      { name: 'ogimg.xyz', url: 'https://ogimg.xyz/', desc: 'API для генерации Open Graph изображений: шаблоны, брендинг, авто-загрузка. Есть бесплатный тариф.', cat: 'social' },
      { name: 'GTmetrix', url: 'https://gtmetrix.com/', desc: 'Анализ скорости сайта и рекомендации по производительности.', cat: 'misc' },
      { name: 'Pingdom', url: 'https://tools.pingdom.com/', desc: 'Проверка времени загрузки и производительности сайта.', cat: 'misc' },
      { name: 'DebugBear', url: 'https://www.debugbear.com/test/website-speed', desc: 'Анализ скорости страницы и отчёт по Google CrUX.', cat: 'misc' },
      { name: 'GEO/AEO Tracker', url: 'https://github.com/danishashko/geo-aeo-tracker', desc: 'Open source дашборд видимости в AI: упоминания бренда, цитирования, BYOK, self-hosted.', cat: 'misc' }
    ];

    const searchEl = document.getElementById('search');
    const cardsEl = document.getElementById('cards');
    const counterEl = document.getElementById('counter');
    const toTopEl = document.getElementById('toTop');
    const sidebarFilters = document.getElementById('sidebar-filters');
    const toolbarFilters = document.getElementById('toolbar-filters');

    let currentCategory = 'all';
    let searchQuery = '';

    function normalize(s) {
      return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function filterTools() {
      const q = normalize(searchQuery);
      const cat = currentCategory;
      return TOOLS.filter(t => {
        const matchCat = cat === 'all' || t.cat === cat;
        const matchSearch = !q || normalize(t.name).includes(q) || normalize(t.desc).includes(q);
        return matchCat && matchSearch;
      });
    }

    function renderFilters(container, isToolbar) {
      const entries = Object.entries(CATEGORIES);
      container.innerHTML = entries.map(([key, label]) => {
        const active = currentCategory === key ? ' active' : '';
        return `<button type="button" class="filter-btn${active}" data-cat="${key}">${label}</button>`;
      }).join('');
      container.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentCategory = btn.dataset.cat;
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.cat === currentCategory);
          });
          render();
        });
      });
    }

    function renderCards(list) {
      if (list.length === 0) {
        cardsEl.innerHTML = '<p class="no-results">По вашему запросу ничего не найдено. Измените поиск или категорию.</p>';
        return;
      }
      cardsEl.innerHTML = list.map(t => `
        <article class="card" data-category="${t.cat}">
          <h3 class="card-title"><a href="${t.url}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a></h3>
          <p class="card-desc">${escapeHtml(t.desc)}</p>
          <span class="card-badge">${escapeHtml(CATEGORIES[t.cat])}</span>
        </article>
      `).join('');
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function render() {
      const list = filterTools();
      counterEl.innerHTML = 'Найдено: <strong>' + list.length + '</strong>';
      renderCards(list);
    }

    searchEl.addEventListener('input', () => {
      searchQuery = searchEl.value.trim();
      render();
    });

    window.addEventListener('scroll', () => {
      toTopEl.classList.toggle('visible', window.scrollY > 400);
    });

    toTopEl.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderFilters(sidebarFilters, false);
    renderFilters(toolbarFilters, true);
    render();
  </script>
</body>
</html>
