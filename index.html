<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Подборка лучших SEO-инструментов: исследование ключевых слов, анализ ссылок, оптимизация контента, технический и локальный SEO. Каталог на русском языке для продвижения сайтов в РФ и СНГ.">
  <title>Каталог SEO-инструментов для продвижения и оптимизации сайтов</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #161b22;
      --bg-input: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
    }

    header {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin: 1rem 0;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filter-btn {
      padding: 0.5rem 0.9rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .filter-btn:hover {
      background: var(--bg-card);
      border-color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .counter {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-left: auto;
    }

    .counter strong { color: var(--success); }

    main {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }

    .sidebar {
      position: sticky;
      top: 1rem;
      height: fit-content;
    }

    .sidebar-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .sidebar .filter-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 0.25rem;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-content: start;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .card-title {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .card-title a {
      color: var(--accent);
      text-decoration: none;
    }

    .card-title a:hover { color: var(--accent-hover); text-decoration: underline; }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .card-head .card-title { margin: 0 0 0.35rem; flex: 1; }
    .card-head .help-trigger { flex-shrink: 0; margin-top: 0.1rem; }

    .card-desc {
      margin: 0 0 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .card-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .to-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.25rem;
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s, transform 0.15s;
    }

    .to-top-wrap {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .to-top-wrap.visible {
      opacity: 1;
      visibility: visible;
    }
    .to-top { position: relative; bottom: auto; right: auto; }
    .to-top:hover { transform: scale(1.05); }

    .help-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .help-wrap.block { display: flex; width: 100%; }
    .help-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 50%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .help-trigger:hover {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 520px;
      width: 100%;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }
    .modal-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1.1rem;
    }
    .modal-desc {
      padding: 0 1.25rem 0.75rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }
    .modal-body {
      padding: 1rem 1.25rem;
      overflow-y: auto;
    }
    .accordion-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .accordion-item:last-child { margin-bottom: 0; }
    .accordion-head {
      width: 100%;
      padding: 0.65rem 1rem;
      background: var(--bg-input);
      border: none;
      color: var(--text);
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .accordion-head:hover { background: var(--bg); }
    .accordion-head::after {
      content: '+';
      font-size: 1.1rem;
      color: var(--accent);
      flex-shrink: 0;
    }
    .accordion-item.open .accordion-head::after { content: '−'; }
    .accordion-body {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease-out;
    }
    .accordion-item.open .accordion-body { max-height: 80vh; }
    .accordion-body-inner {
      padding: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text-muted);
    }
    .accordion-body-inner p { margin: 0 0 0.5rem; }
    .accordion-body-inner p:last-child { margin-bottom: 0; }
    .modal-close {
      margin: 0 1.25rem 1rem;
      padding: 0.5rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .modal-close:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
  </style>
</head>

        return matchCat && matchSearch;
      });

        return;
      }
      cardsEl.innerHTML = list.map(t => `
        <article class="card" data-category="${t.cat}">
          <div class="card-head">
            <h3 class="card-title"><a href="${t.url}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a></h3>
            <button type="button" class="help-trigger card-help-trigger" data-tool-name="${escapeHtml(t.name)}" title="Инструкция по использованию" aria-label="Инструкция">i</button>
          </div>
          <p class="card-desc">${escapeHtml(t.desc)}</p>
          <span class="card-badge">${escapeHtml(CATEGORIES[t.cat])}</span>
        </article>
      `).join('');
      cardsEl.querySelectorAll('.card-help-trigger').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const tool = TOOLS.find(x => x.name === btn.getAttribute('data-tool-name'));
          if (tool) openToolHelp(tool);
        });
      });
    }

    });

    toTopEl.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function fillModalAndOpen(data) {
      modalTitle.textContent = data.title;
      modalDesc.textContent = data.desc;
      modalAccordion.innerHTML = data.accordion.map((item) => `
        <div class="accordion-item">
          <button type="button" class="accordion-head">${escapeHtml(item.title)}</button>
          <div class="accordion-body">
            <div class="accordion-body-inner"><p>${escapeHtml(item.body)}</p></div>
          </div>
        </div>
      `).join('');
      modalAccordion.querySelectorAll('.accordion-item').forEach(el => {
        const head = el.querySelector('.accordion-head');
        head.addEventListener('click', () => {
          const wasOpen = el.classList.contains('open');
          modalAccordion.querySelectorAll('.accordion-item').forEach(other => other.classList.remove('open'));
          if (!wasOpen) el.classList.add('open');
        });
      });
      helpModal.classList.add('open');
      helpModal.setAttribute('aria-hidden', 'false');
    }

    function openHelp(key) {
      const data = HELP_CONTENT[key];
      if (!data) return;
      fillModalAndOpen(data);
    }

    function openToolHelp(tool) {
      const data = getToolHelp(tool);
      if (!data) return;
      fillModalAndOpen(data);
    }

    function closeHelp() {
      helpModal.classList.remove('open');
      helpModal.setAttribute('aria-hidden', 'true');
    }

    document.querySelectorAll('.help-trigger').forEach(btn => {
      btn.addEventListener('click', () => openHelp(btn.getAttribute('data-help')));
    });
    modalClose.addEventListener('click', closeHelp);
    helpModal.addEventListener('click', (e) => {
      if (e.target === helpModal) closeHelp();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && helpModal.classList.contains('open')) closeHelp();
    });

    renderFilters(sidebarFilters, false);
    renderFilters(toolbarFilters, true);
    render();
  </script>
</body>
</html>
